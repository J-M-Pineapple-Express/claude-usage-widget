<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Claude Usage</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="card">
    <div id="drag" class="drag">
      <span class="title">Claude Usage</span>
      <div class="actions">
        <button id="refresh" title="Refresh">↻</button>
        <button id="close" title="Quit">×</button>
      </div>
    </div>

    <div class="row">
      <div class="label">5-hour</div>
      <div class="bar"><div id="bar-5h" class="fill"></div></div>
      <div class="pct" id="pct-5h">—</div>
    </div>
    <div class="reset" id="reset-5h">waiting…</div>

    <div class="row">
      <div class="label">Weekly</div>
      <div class="bar"><div id="bar-wk" class="fill"></div></div>
      <div class="pct" id="pct-wk">—</div>
    </div>
    <div class="reset" id="reset-wk">waiting…</div>

    <div class="divider"></div>
    <div class="extra-row">
      <span class="extra-label">Extra spent</span>
      <span id="extra-spent" class="extra-val">—</span>
    </div>
    <div class="extra-row">
      <span class="extra-label">Balance</span>
      <span id="extra-balance" class="extra-val">—</span>
    </div>

    <div id="status" class="status">Connecting…</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
